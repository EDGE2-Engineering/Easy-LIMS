name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile-apps/android/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        working-directory: mobile-apps/android
        run: npm install

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prebuild Android
        working-directory: mobile-apps/android
        run: npx expo prebuild --platform android

      - name: Build APK
        working-directory: mobile-apps/android/android
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: mobile-apps/android/android/app/build/outputs/apk/debug/app-debug.apk
